services:
  mysql-db:
    image: mysql:9.0
    container_name: fooddelivery-mysql
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: fooddelivery_db
    volumes:
      - mysql_data:/var/lib/mysql

  backend-app:
    image: ikenuyh/fooddelivery-backend:latest
    container_name: fooddelivery-backend-app
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mysql-db
    environment:
      # Ket noi voi MySQL thong qua ten service
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/fooddelivery_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none

  # Them Caddy de lo vu HTTPS
  reverse-proxy:
    image: caddy:2-alpine
    container_name: fooddelivery-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mysql_data:
  caddy_data:
  caddy_config: